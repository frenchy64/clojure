name: Experiment 01 - Nil Optimization

on:
  push:
    branches:
      - copilot/**
  pull_request:
  workflow_dispatch:

jobs:
  nil-optimization-experiment:
    name: Measure Nil Optimization Impact
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Need full history to checkout master branch
    
    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Run Nil Optimization Experiment
      run: |
        cd experiments
        bash 01-nil-optimization.sh
    
    - name: Upload experiment results
      uses: actions/upload-artifact@v4
      with:
        name: nil-optimization-results
        path: experiments/results/01-nil-optimization/
        retention-days: 90
    
    - name: Display Results Summary
      if: always()
      run: |
        if [ -f experiments/results/01-nil-optimization/summary.txt ]; then
          echo "### Experiment Results" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat experiments/results/01-nil-optimization/summary.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Verify Results Match Expected
      if: github.event_name == 'pull_request' || github.event_name == 'push'
      run: |
        # This step will verify results match expected values once we've established baseline
        # For now, just check that the experiment completed successfully
        if [ ! -f experiments/results/01-nil-optimization/summary.txt ]; then
          echo "ERROR: Experiment did not generate expected results"
          exit 1
        fi
        
        # Check that both JARs were built
        if [ ! -f experiments/results/01-nil-optimization/baseline.jar ]; then
          echo "ERROR: Baseline JAR not found"
          exit 1
        fi
        
        if [ ! -f experiments/results/01-nil-optimization/optimized.jar ]; then
          echo "ERROR: Optimized JAR not found"
          exit 1
        fi
        
        echo "✓ Experiment completed successfully"
        echo "✓ All expected artifacts generated"
